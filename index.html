<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Personal - DULCE GUSTO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="page-login">
    <div class="auth-container">
        <div class="auth-box" id="box-login">
            <h1 class="logo">DULCE GUSTO</h1>
            <p style="margin-bottom: 20px; color: #666;">Acceso para Personal (Admin/Repartidor)</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="log-email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="log-pass" required placeholder="******">
                </div>
                <button type="submit" class="btn btn-block">Ingresar al Sistema</button>
            </form>
            <a href="tienda.html" style="display:block; margin-top:20px; color:var(--gold); text-decoration:none; font-weight:bold;">← Volver a la Tienda</a>
            
            <div style="margin-top:20px; font-size:0.8rem; color:#888; text-align:left; border-top: 1px solid #eee; padding-top:10px;">
                <p><b>Cuentas de prueba:</b></p>
                <p>Admin: admin@dulcegusto.com / 123</p>
                <p>Delivery: delivery@dulcegusto.com / 123</p>
            </div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
